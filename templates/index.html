<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart AI Chatbot</title>
    <style>
      :root {
        --primary: #6366f1;
        --bg: #0f172a;
        --chat-bg: #1e293b;
        --user-msg: #3b82f6;
        --bot-msg: #334155;
        --text: #f8fafc;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      body {
        background: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .chat-container {
        width: 420px;
        height: 620px;
        background: var(--chat-bg);
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .header {
        padding: 16px;
        background: var(--primary);
        text-align: center;
        font-weight: bold;
        font-size: 1.1rem;
      }
      .messages {
        flex: 1;
        padding: 16px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .message {
        max-width: 80%;
        padding: 10px 14px;
        border-radius: 12px;
        line-height: 1.4;
        word-wrap: break-word;
        animation: fadeIn 0.3s ease;
      }
      .user {
        align-self: flex-end;
        background: var(--user-msg);
        color: white;
        border-bottom-right-radius: 2px;
      }
      .bot {
        align-self: flex-start;
        background: var(--bot-msg);
        color: var(--text);
        border-bottom-left-radius: 2px;
      }
      .input-area {
        padding: 12px;
        background: #0f172a;
        display: flex;
        gap: 8px;
      }
      input {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #1e293b;
        color: white;
        outline: none;
      }
      button {
        padding: 12px 16px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
      }
      button:hover {
        background: #4f46e5;
      }
      .typing {
        font-style: italic;
        color: #94a3b8;
        font-size: 0.85rem;
        margin-left: 12px;
        display: none;
        padding-bottom: 8px;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <div class="header">AI Chatbot</div>
      <div class="messages" id="messages">
        <div class="message bot">
          Hello! I'm your rule-based AI assistant. Type <b>help</b> to see what
          I can do!
        </div>
      </div>
      <div class="typing" id="typing">Bot is thinking...</div>
      <div class="input-area">
        <input
          type="text"
          id="userInput"
          placeholder="Type a message..."
          autocomplete="off"
        />
        <button type="button" id="sendBtn">Send</button>
      </div>
    </div>

    <script>
      const messagesDiv = document.getElementById("messages");
      const input = document.getElementById("userInput");
      const sendBtn = document.getElementById("sendBtn");
      const typingIndicator = document.getElementById("typing");

      function addMessage(text, sender) {
        const div = document.createElement("div");
        div.classList.add("message", sender);
        div.innerHTML = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }

      async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        // Add user message to chat
        addMessage(text, "user");
        input.value = "";

        // Show typing indicator
        typingIndicator.style.display = "block";
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        try {
          // Make POST request to backend
          const response = await fetch("/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ message: text }),
          });

          // Check if response is ok
          if (!response.ok) {
            throw new Error(`Server error: ${response.status}`);
          }

          const data = await response.json();

          // Hide typing indicator and show bot response
          typingIndicator.style.display = "none";
          addMessage(data.response, "bot");
        } catch (error) {
          console.error("Error:", error);
          typingIndicator.style.display = "none";
          addMessage(
            "Connection error. Make sure app.py is running on port 5000.",
            "bot",
          );
        }
      }

      // Event listeners
      sendBtn.addEventListener("click", function (e) {
        e.preventDefault(); // Prevent any default form submission
        sendMessage();
      });

      input.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          e.preventDefault(); // Prevent form submission
          sendMessage();
        }
      });

      // Focus input on load
      input.focus();
    </script>
  </body>
</html>
